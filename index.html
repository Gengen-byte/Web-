
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>みんツジ | みんなのツジドウ</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0C447C">

<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png?v=2">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png?v=2">

<!-- iOS Safari の「ホーム画面に追加」対応 -->
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png?v=2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="みんツジ">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="style.css?v=3">
</head>
<body>

  <header class="app-header">
    <div class="logo">
      <img src="logo.png" class="logo-icon" alt="みんツジ | みんなのツジドウ">
    </div>
    <p class="app-hint">地図をタップして、辻堂へのメッセージを残そう（24時間で消えます）</p>
  </header>

  <div id="map"></div>

  <button id="locate-btn" class="locate-btn" type="button" aria-label="現在地から投稿する">
    <span class="locate-btn-icon">📍</span>
    <span class="locate-btn-label">現在地から投稿</span>
  </button>

  <div id="toast" class="toast hidden"></div>

  <!-- 投稿フォーム モーダル -->
  <div id="post-modal" class="modal-overlay hidden">
    <div class="modal-card">
      <h2>メッセージを投稿</h2>

      <div class="category-picker" role="group" aria-label="投稿カテゴリを選択">
        <button type="button" class="category-btn active" data-category="normal">📝 通常の投稿</button>
        <button type="button" class="category-btn" data-category="new_shop">🎉 新店オープン</button>
        <button type="button" class="category-btn" data-category="notice">⚠️ お知らせ・注意</button>
        <button type="button" class="category-btn" data-category="event">🎪 イベント</button>
      </div>

      <textarea id="post-text" maxlength="140" placeholder="辻堂での出来事や気持ちを書いてみよう（140文字まで）"></textarea>
      <div class="char-count"><span id="char-count">0</span>/140</div>

      <div id="photo-picker" class="photo-picker">
        <label for="post-photo" class="photo-picker-label">
          <span class="photo-picker-icon">📷</span>
          <span>写真を追加（任意）</span>
        </label>
        <input type="file" id="post-photo" accept="image/*" hidden>
      </div>
      <div id="photo-preview-wrap" class="photo-preview-wrap hidden">
        <img id="photo-preview" class="photo-preview" alt="投稿する写真のプレビュー">
        <button id="photo-remove" type="button" class="photo-remove" aria-label="写真を削除">✕</button>
      </div>

      <p id="post-error" class="post-error hidden"></p>
      <div class="modal-actions">
        <button id="post-cancel" class="btn btn-secondary">キャンセル</button>
        <button id="post-submit" class="btn btn-primary">投稿する</button>
      </div>


    </div>
  </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js?v=3"></script>
</body>
</html>
