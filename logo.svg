  <!-- ほっぺ -->
  <ellipse cx="87" cy="138" rx="13" ry="8" fill="#ffd6e0" opacity="0.85"/>
  <ellipse cx="153" cy="138" rx="13" ry="8" fill="#ffd6e0" opacity="0.85"/>

  <!-- 目 -->
  <g fill="#3d4f5c">
    <circle cx="100" cy="120" r="9"/>
    <circle cx="140" cy="120" r="9"/>
  </g>
  <g fill="#ffffff">
    <circle cx="97" cy="116" r="3"/>
    <circle cx="137" cy="116" r="3"/>
  </g>

  <!-- 口 -->
  <path d="M108,146 Q120,158 132,146" fill="none" stroke="#3d4f5c" stroke-width="4.5" stroke-linecap="round"/>
</svg>
