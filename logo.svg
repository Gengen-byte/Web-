<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <linearGradient id="mintsuji-body-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c3e6f5"/>
      <stop offset="100%" stop-color="#7bb8d4"/>
    </linearGradient>
  </defs>

  <!-- 足元の波紋 -->
  <path d="M40,214 Q52,206 64,214 T88,214 T112,214" fill="none" stroke="#7bb8d4" stroke-width="5" stroke-linecap="round" opacity="0.45"/>
  <path d="M128,220 Q140,212 152,220 T176,220 T200,220" fill="none" stroke="#7bb8d4" stroke-width="5" stroke-linecap="round" opacity="0.35"/>

  <!-- キラキラ -->
  <g fill="#fff2b2">
    <path d="M188,46 L192,58 L204,62 L192,66 L188,78 L184,66 L172,62 L184,58 Z"/>
    <path d="M46,86 L49,94 L57,97 L49,100 L46,108 L43,100 L35,97 L43,94 Z"/>
  </g>

  <!-- からだ（波のしずく） -->
  <path d="M120,38
           C158,38 188,72 188,113
           C188,159 154,196 120,196
           C86,196 52,159 52,113
           C52,72 82,38 120,38 Z"
        fill="url(#mintsuji-body-gradient)"
        stroke="#3d4f5c" stroke-width="5" stroke-linejoin="round"/>

  <!-- 波の巻き毛（クレスト） -->
  <path d="M146,46
           C167,29 190,38 186,60
           C183,77 159,76 151,63
           C147,56 143,50 146,46 Z"
        fill="#eef8fc"
